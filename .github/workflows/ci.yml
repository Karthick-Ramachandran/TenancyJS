name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgresql://postgres@127.0.0.1:5432/tenancyjs_test
      MYSQL_TEST_DATABASE_URL: mysql://root:root@127.0.0.1:3306/tenancyjs_test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: tenancyjs_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tenancyjs_test"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tenancyjs_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    strategy:
      fail-fast: false
      matrix:
        node: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gates
        run: pnpm check
