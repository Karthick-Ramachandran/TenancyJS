name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    env:
      TEST_DATABASE_URL: postgresql://postgres@127.0.0.1:5432/tenancyjs_test
      MYSQL_TEST_DATABASE_URL: mysql://root:root@127.0.0.1:3306/tenancyjs_test
      TEST_MONGODB_URL: mongodb://127.0.0.1:27017/?replicaSet=rs0&directConnection=true
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: tenancyjs_test
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tenancyjs_test"
          --health-interval 2s
          --health-timeout 2s
          --health-retries 15
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: tenancyjs_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    strategy:
      fail-fast: false
      matrix:
        node: [24]

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # MongoDB needs a replica set for Mongoose managed transactions. Service
      # containers can't set --replSet, so start + initiate it here.
      - name: Start MongoDB replica set
        run: |
          docker run -d --name mongo -p 27017:27017 mongo:7 --replSet rs0
          echo "Waiting for mongod..."
          for i in $(seq 1 30); do
            docker exec mongo mongosh --quiet --eval 'db.runCommand({ ping: 1 })' >/dev/null 2>&1 && break
            sleep 2
          done
          docker exec mongo mongosh --quiet --eval 'rs.initiate({ _id: "rs0", members: [{ _id: 0, host: "127.0.0.1:27017" }] })'
          echo "Waiting for primary..."
          for i in $(seq 1 30); do
            [ "$(docker exec mongo mongosh --quiet --eval 'rs.status().myState' 2>/dev/null)" = "1" ] && break
            sleep 2
          done

      - name: Run quality gates
        run: pnpm check
